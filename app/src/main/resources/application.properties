spring.application.name=app

# Database Configuration (H2 In-Memory)
spring.datasource.url=jdbc:h2:mem:clinicdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console Settings
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA & Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
# Note: In production, the secret key should be injected via environment variables.
application.security.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
application.security.jwt.expiration=86400000

# Appointment Settings
clinic.appointment.default-duration=30

# Document Settings
clinic.document.upload-dir=./uploads
